<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Есть контакт! Нетворкинг с удовольствием</title>
  <link rel="stylesheet" href="hub.css">
</head>
<body>

<!-- ===== ОБЛОЖКА ===== -->
<section class="cover" id="cover">

  <!-- Градиентный фон -->
  <div class="cover-bg-gradient"></div>

  <!-- Орбы (оставляем для атмосферы, без сетки) -->
  <div class="cover-orbs">
    <div class="cover-orb cover-orb-1"></div>
    <div class="cover-orb cover-orb-2"></div>
    <div class="cover-orb cover-orb-3"></div>
  </div>

  <!-- Стикеры -->
  <div class="cover-stickers">

    <!-- 1. Будь собой — слева по центру -->
    <div class="cover-sticker sticker-hide-mobile" style="left:12%; top:38%;"
         data-tip="Тебе не нужно становиться «душой компании». Нетворкинг — это не про экстраверсию. Это про навык. А навыки можно развить.">
      <img src="img/cover/sticker-01.png" alt="Будь собой">
    </div>

    <!-- 2. После курса — другой разговор — сверху слева -->
    <div class="cover-sticker" style="left:17%; top:10%;"
         data-tip="Даже ёжики разворачиваются, когда чувствуют себя в безопасности. Дай себе время — и ты тоже раскроешься.">
      <img src="img/cover/sticker-02.png" alt="После курса — другой разговор">
    </div>

    <!-- 3. Ты готов! — сверху по центру -->
    <div class="cover-sticker" style="left:46%; top:5%;"
         data-tip="Маленький секрет: даже самые уверенные люди на конференциях нервничают. Они просто знают пару приёмов. Скоро ты тоже будешь их знать.">
      <img src="img/cover/sticker-03.png" alt="Ты готов!">
    </div>

    <!-- 4. Здесь куют контакты — сверху справа -->
    <div class="cover-sticker" style="right:10%; top:10%;"
         data-tip="Нетворкинг в своей основе — это не про выгоду. Это про людей. Про настоящий интерес к другому человеку. И когда он настоящий — всё остальное происходит само.">
      <img src="img/cover/sticker-04.png" alt="Здесь куют контакты">
    </div>

    <!-- 5. Один шаг. Одно «Привет» — справа по центру -->
    <div class="cover-sticker sticker-hide-mobile" style="right:8%; top:38%;"
         data-tip="Каждый новый контакт — это дверь. Ты не знаешь, что за ней: проект мечты, наставник, партнёр, друг. Но чтобы узнать — нужно просто сказать «привет».">
      <img src="img/cover/sticker-05.png" alt="Один шаг. Одно «Привет»">
    </div>

  
    <!-- 6. Твой выход — снизу слева -->
    <div class="cover-sticker" style="left:18%; bottom:12%;"
         data-tip="Где-то в зале конференции стоит человек, которому нужно именно то, что умеешь ты. А тебе нужно то, что умеет он. Нетворкинг — это искусство найти свой пазл.">
      <img src="img/cover/sticker-07.png" alt="Твой выход">
    </div>

<!-- 7. Учись сейчас — используй завтра — снизу по центру -->
<div class="cover-sticker" style="left:44%; bottom:8%;"
     data-tip="Сегодня ты посадишь семечко — скажешь «привет» одному человеку. Через полгода из этого может вырасти проект, партнёрство, дружба."
     data-tip-pos="force-right">
  <img src="img/cover/sticker-06.png" alt="Учись сейчас — используй завтра">
</div>

    <!-- 8. Иди и знакомься — снизу справа -->
    <div class="cover-sticker" style="right:10%; bottom:10%;"
         data-tip="Каждый человек, с которым ты знакомишься, несёт в себе подарок: знание, идею, контакт, вдохновение. Иногда — просто хорошую историю за кофе.">
      <img src="img/cover/sticker-08.png" alt="Иди и знакомься">
    </div>

    <!-- Тултип (один общий) -->
    <div class="sticker-tooltip" id="sticker-tooltip"></div>

  </div>

  <!-- Центральный контент — БЕЗ ИЗМЕНЕНИЙ -->
  <div class="cover-content">
          <div class="cover-badge">симулятор нетворкинга</div>
    <h1 class="cover-title">Есть <span class="cover-accent">контакт!</span></h1>
    <p class="cover-subtitle">Нетворкинг с удовольствием</p>
    <p class="cover-desc">От неловких знакомств до работающих связей.<br>Научись чувствовать себя «своим» в любой среде.</p>
    <a href="map.html" class="cover-btn" id="cover-start-btn">
  <span>Погрузиться</span>
  <span class="cover-btn-arrow">↓</span>
</a>
      <div class="cover-stats">
      <div class="cover-stat"><div class="cover-stat-num">3</div><div class="cover-stat-label">модуля</div></div>
      <div class="cover-stat-divider"></div>
      <div class="cover-stat"><div class="cover-stat-num">30</div><div class="cover-stat-label">уроков</div></div>
      <div class="cover-stat-divider"></div>
      <div class="cover-stat"><div class="cover-stat-num">∞</div><div class="cover-stat-label">связей</div></div>
    </div>
  </div>
  
 <!-- Подсказка внизу — вне cover-content -->
  <div class="cover-sticker-hint">✦ Нажимай на стикеры, чтобы настроиться на курс ✦</div>
  
</section>
<script src="course-progress.js"></script>
<script src="scorm-api.js"></script>
<script>
document.getElementById('cover-start-btn')?.addEventListener('click', function(e) {
  e.preventDefault();
  CourseProgress.navigate('map.html');
});
</script>
<script src="hub.js"></script>
</body>
</html>
