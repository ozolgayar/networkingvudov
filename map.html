<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карта курса</title>
  <link rel="stylesheet" href="map.css">
</head>
<body>

<div class="map-page">

  <!-- ШАПКА -->
  <header class="map-header">
    <a href="index.html" class="map-back" id="map-back-link">← Назад</a>
    <h1 class="map-title">Карта курса</h1>
    <div></div>
  </header>

  <p class="map-subtitle">Три модуля — три шага к мастерству нетворкинга</p>

  <div class="course-complete-badge" id="course-complete-badge">
    🏆 Курс пройден
  </div>

  <!-- ПЛЮМБОБ -->
  <div class="plumbob-wrap">
    <svg class="plumbob-svg" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pg1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#90f060"/>
          <stop offset="50%"  stop-color="#3db52a"/>
          <stop offset="100%" stop-color="#1a6e10"/>
        </linearGradient>
        <filter id="pglow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- Тень -->
      <polygon points="50,8 95,55 50,122 5,55" fill="rgba(0,0,0,0.18)" transform="translate(3,4)"/>
      <!-- Основной ромб -->
      <polygon points="50,8 95,55 50,122 5,55" fill="url(#pg1)" filter="url(#pglow)"/>
      <!-- Внутренний ромб (светлее) -->
      <polygon points="50,26 80,55 50,98 20,55" fill="#6ee040" opacity="0.45"/>
      <!-- Блик -->
      <polygon points="50,14 70,42 50,62 30,42" fill="white" opacity="0.22"/>
      <polygon points="38,20 52,18 44,36" fill="white" opacity="0.35"/>
    </svg>
  </div>

  <!-- ТРИ СОТЫ -->
  <div class="hexmap">

    <!-- МОДУЛЬ 1 -->
    <div class="hx-wrap hx-current" id="hex-1" data-module="1" role="button" tabindex="0">
      <svg class="hx-bg" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="hg1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#daeaf8"/>
            <stop offset="100%" stop-color="#8ab4dc"/>
          </linearGradient>
        </defs>
        <!-- Тёмная обводка -->
        <polygon points="100,4 196,54 196,166 100,216 4,166 4,54" fill="#2a3f6e"/>
        <!-- Заливка -->
        <polygon points="100,12 188,59 188,161 100,208 12,161 12,59" fill="url(#hg1)"/>
        <!-- Блик -->
        <polygon points="100,18 160,52 100,90 40,52" fill="white" opacity="0.18"/>
      </svg>
      <div class="hx-content">
        <img class="hx-icon-img" src="img/map/module-1.png" alt="Модуль 1">
        <div class="hx-num">01</div>
        <div class="hx-name">Подготовка —<br>основа успеха</div>
        <div class="hx-badge current">▶ Текущий</div>
      </div>
    </div>

    <!-- МОДУЛЬ 2 -->
    <div class="hx-wrap hx-locked" id="hex-2" data-module="2" role="button" tabindex="0">
      <svg class="hx-bg" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="hg2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#d0e8ff"/>
            <stop offset="100%" stop-color="#7aafd8"/>
          </linearGradient>
        </defs>
        <polygon points="100,4 196,54 196,166 100,216 4,166 4,54" fill="#2a3f6e"/>
        <polygon points="100,12 188,59 188,161 100,208 12,161 12,59" fill="url(#hg2)"/>
        <polygon points="100,18 160,52 100,90 40,52" fill="white" opacity="0.22"/>
      </svg>
      <div class="hx-content">
         <img class="hx-icon-img" src="img/map/module-2.png" alt="Модуль 2">
        <div class="hx-num">02</div>
        <div class="hx-name">Есть<br>контакт!</div>
        <div class="hx-badge locked">🔒 Заблокирован</div>
      </div>
    </div>

    <!-- МОДУЛЬ 3 -->
    <div class="hx-wrap hx-locked" id="hex-3" data-module="3" role="button" tabindex="0">
      <svg class="hx-bg" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="hg3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#c0d0e4"/>
            <stop offset="100%" stop-color="#8096b0"/>
          </linearGradient>
        </defs>
        <polygon points="100,4 196,54 196,166 100,216 4,166 4,54" fill="#2a3f6e"/>
        <polygon points="100,12 188,59 188,161 100,208 12,161 12,59" fill="url(#hg3)" opacity="0.7"/>
        <polygon points="100,18 160,52 100,90 40,52" fill="white" opacity="0.12"/>
      </svg>
      <div class="hx-content">
         <img class="hx-icon-img" src="img/map/module-3.png" alt="Модуль 3">
        <div class="hx-num">03</div>
        <div class="hx-name">На<br>связи</div>
        <div class="hx-badge locked">🔒 Заблокирован</div>
      </div>
    </div>

  </div><!-- /hexmap -->

  <!-- ПРОГРЕСС -->
  <div class="progress-section">
    <div class="progress-label">
      <span>Прогресс курса</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill"></div>
    </div>
    <div class="progress-sub" id="prog-sub">Пройдено: <strong>0 из 3 модулей</strong></div>
  </div>

</div><!-- /map-page -->

<!-- ТУЛТИП -->
<div class="hc-tooltip" id="hc-tooltip"></div>

<script src="course-progress.js"></script>
<script>
const MODULE_URLS = { 1: 'module1.html', 2: 'module2.html', 3: 'module3.html' };

function setHexState(hex, state, badgeText) {
  if (!hex) return;
  hex.classList.remove('hx-done', 'hx-current', 'hx-locked');
  hex.classList.add(state);
  const badge = hex.querySelector('.hx-badge');
  if (badge) {
    badge.className = 'hx-badge ' + (state === 'hx-done' ? 'done' : state === 'hx-current' ? 'current' : 'locked');
    badge.textContent = badgeText;
  }
}

/* ── Применяем статусы модулей на карте ────────────────── */
function applyCourseProgress() {
  const m1Done = CourseProgress.isModule1Complete();
  const m2Done = CourseProgress.isModule2Complete();
  const m3Done = CourseProgress.isModule3Complete();
  const m2Open = CourseProgress.isModule2Unlocked();
  const m3Open = CourseProgress.isModule3Unlocked();

  const hex1 = document.getElementById('hex-1');
  const hex2 = document.getElementById('hex-2');
  const hex3 = document.getElementById('hex-3');

  if (m1Done) {
    setHexState(hex1, 'hx-done', '✓ Пройден');
  } else {
    setHexState(hex1, 'hx-current', '▶ Текущий');
  }

  if (m2Done) {
    setHexState(hex2, 'hx-done', '✓ Пройден');
  } else if (m2Open) {
    setHexState(hex2, 'hx-current', '▶ Текущий');
  } else {
    setHexState(hex2, 'hx-locked', '🔒 Заблокирован');
  }

  if (m3Done) {
    setHexState(hex3, 'hx-done', '✓ Пройден');
  } else if (m3Open) {
    setHexState(hex3, 'hx-current', '▶ Текущий');
  } else {
    setHexState(hex3, 'hx-locked', '🔒 Заблокирован');
  }

  let doneCount = 0;
  if (m1Done) doneCount++;
  if (m2Done) doneCount++;
  if (m3Done) doneCount++;

  const percent = Math.round((doneCount / 3) * 100);
  const fill = document.getElementById('prog-fill');
  if (fill) setTimeout(() => { fill.style.width = percent + '%'; }, 400);

  const labelPct = document.getElementById('prog-pct');
  if (labelPct) labelPct.textContent = percent + '%';

  const sub = document.getElementById('prog-sub');
  if (sub) sub.innerHTML = 'Пройдено: <strong>' + doneCount + ' из 3 модулей</strong>';

  const courseBadge = document.getElementById('course-complete-badge');
  if (courseBadge) courseBadge.classList.toggle('visible', m3Done);
}

/* ── Переход в модуль ──────────────────────────────────── */
function goModule(n) {
  const gate = CourseProgress.gateModule(n);
  const hex = document.getElementById('hex-' + n);

  if (!gate.ok) {
    if (hex) {
      hex.classList.add('shake');
      setTimeout(() => hex.classList.remove('shake'), 500);
      showTip('🔒 ' + gate.message, hex);
    }
    return;
  }

  CourseProgress.navigate(MODULE_URLS[n]);
}

/* ── Тултип ────────────────────────────────────────────── */
let tipT;
function showTip(text, el) {
  const tip = document.getElementById('hc-tooltip');
  const r   = el.getBoundingClientRect();
  tip.textContent = text;
  tip.style.left  = (r.left + r.width/2) + 'px';
  tip.style.top   = (r.top - 48 + scrollY) + 'px';
  tip.classList.add('on');
  clearTimeout(tipT);
  tipT = setTimeout(() => tip.classList.remove('on'), 2200);
}

function bindHexClicks() {
  document.querySelectorAll('.hx-wrap[data-module]').forEach(hex => {
    const n = parseInt(hex.getAttribute('data-module'), 10);
    hex.addEventListener('click', () => goModule(n));
    hex.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        goModule(n);
      }
    });
  });
}

/* ── Инициализация ─────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  applyCourseProgress();
  bindHexClicks();
});
</script>
</body>
</html>
